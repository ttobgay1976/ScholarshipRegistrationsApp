# application-prod.properties

# =====================================================

# DATABASE

# =====================================================

spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.config.import=optional:file:.env[.properties]

spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

# =====================================================

# HIKARI CONNECTION POOL

# =====================================================

spring.datasource.hikari.pool-name=SPRMS-HikariPool

spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.maximum-pool-size=20

spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.validation-timeout=5000

spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.keepalive-time=300000

spring.datasource.hikari.auto-commit=false

# =====================================================

# JPA / HIBERNATE

# =====================================================

spring.jpa.hibernate.ddl-auto=validate

spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

logging.level.org.hibernate.SQL=WARN
logging.level.org.hibernate.orm.jdbc.bind=WARN

# =====================================================

# APPLICATION LOGGING

# =====================================================

logging.level.root=INFO
logging.level.org.springframework.web.servlet.resource=ERROR

# =====================================================

# PACKAGE SCAN

# =====================================================

packagesToScan=com.sprms.registration

# =====================================================

# NDI CONFIGURATION

# =====================================================

ndi.auth.base.url=https://staging.bhutanndi.com
ndi.base.url=https://demo-client.bhutanndi.com

ndi.client.id=${NDI_CLIENT_KEY}
ndi.client.secret=${NDI_SECRET_KEY}

app.ndiAuthBaseURL=https://staging.bhutanndi.com
app.ndiProofRequestBaseURL=https://demo-client.bhutanndi.com

app.ndiClientId=${NDI_CLIENT_KEY}
app.ndiClientSecretId=${NDI_SECRET_KEY}

app.ndiWebhookToken=${NDI_WEBHOOK_TOKEN}

ndi.webhook.id=${NDI_WEBHOOK_ID}
ndi.webhook.url=${NDI_WEBHOOK_URL}

# =====================================================

# NDI SCHEMAS

# =====================================================

app.foundationSchema=https://dev-schema.ngotag.com/schemas/c7952a0a-e9b5-4a4b-a714-1e5d0a1ae076
app.locationSchema=https://dev-schema.ngotag.com/schemas/e3b606d0-e477-4fc2-b5ab-0adc4bd75c54

# =====================================================

# WEBHOOK SERVICES

# =====================================================

app.webhookRegistrationUrl=https://demo-client.bhutanndi.com/webhook/v1/register
app.subcribeWebhookServices=https://demo-client.bhutanndi.com/webhook/v1/subscribe
app.unSubcribeWebhookServices=https://demo-client.bhutanndi.com/webhook/v1/unsubscribe

# =====================================================

# BCSEA API

# =====================================================

app.bcseaApiUrl=https://staging-datahub-apim.tech.gov.bt/bcsea_marksinformationapi/1.0.0/studentDetails/{indexNo}

app.bcseaTokenUrl=https://stg-sso.tech.gov.bt/oauth2/token

app.bcseaClientKey=${BCSEA_CLIENT_KEY}
app.bcseaSecretKey=${BCSEA_SECRET_KEY}

# =====================================================

# DCRC API

# =====================================================

app.dcrcBaseApiUrl=https://staging-datahub-apim.tech.gov.bt/dcrc_citizen_details_api/1.0.0/citizendetails/{cid}

app.dcrcTokenUrl=https://stg-sso.tech.gov.bt/oauth2/token

app.dcrcClientKey=${DCRC_CLIENT_KEY}
app.dcrcSecretKey=${DCRC_SECRET_KEY}

# =====================================================


# =====================================================
# RESILIENCE4J RETRY - BCSEA
# =====================================================

resilience4j.retry.instances.bcseaApi.max-attempts=3
resilience4j.retry.instances.bcseaApi.wait-duration=2s

# Retry only for temporary technical failures
resilience4j.retry.instances.bcseaApi.retry-exceptions=\
java.net.SocketTimeoutException,\
java.net.ConnectException,\
org.springframework.web.client.ResourceAccessException,\
org.springframework.web.client.HttpServerErrorException

# Do NOT retry business validation errors
resilience4j.retry.instances.bcseaApi.ignore-exceptions=\
com.sprms.registration.exception.BcseaNoDataException,\
java.lang.IllegalArgumentException


# =====================================================
# RESILIENCE4J RETRY - DCRC
# =====================================================

resilience4j.retry.instances.dcrcApi.max-attempts=3
resilience4j.retry.instances.dcrcApi.wait-duration=2s

resilience4j.retry.instances.dcrcApi.retry-exceptions=\
java.net.SocketTimeoutException,\
java.net.ConnectException,\
org.springframework.web.client.ResourceAccessException,\
org.springframework.web.client.HttpServerErrorException

resilience4j.retry.instances.dcrcApi.ignore-exceptions=\
java.lang.IllegalArgumentException