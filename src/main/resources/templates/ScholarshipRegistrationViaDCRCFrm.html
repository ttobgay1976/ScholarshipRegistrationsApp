<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
	xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
	layout:decorate="~{layouts/dashboard}">

<head>
<meta charset="UTF-8">
<title>|| SPRMS - Scholarship Registration ||</title>

<th:block
	th:replace="~{fragments/commonresource_css :: common_resource_css}"></th:block>

<script type="text/javascript">
document.addEventListener("DOMContentLoaded", function() {

	// ===== Dynamic Field Toggle =====

	const countrySelect = document.getElementById("countryOfCompletion");

	const indexNumberField = document.getElementById("indexNumberContainer");
	const indexNumberInput = document.getElementById("indexNumber");

	const fileUploadField = document.getElementById("fileUploadContainer");
	const fileUploadInput = document.getElementById("files");

	if (countrySelect && indexNumberField && indexNumberInput
			&& fileUploadField && fileUploadInput) {

		function toggleFields() {

			const selectedCountry = countrySelect.value;

			// Reset validation
			indexNumberInput.required = false;
			fileUploadInput.required = false;

			// Remove invalid styles
			indexNumberInput.classList.remove("is-invalid");
			fileUploadInput.classList.remove("is-invalid");

			if (selectedCountry === "Other") {

				// Hide Index Number
				indexNumberField.classList.add("hidden");
				indexNumberInput.value = "";

				// Show File Upload
				fileUploadField.classList.remove("hidden");
				fileUploadInput.required = true;

			} else if (selectedCountry === "Bhutan") {

				// Show Index Number
				indexNumberField.classList.remove("hidden");
				indexNumberInput.required = true;

				// Hide File Upload
				fileUploadField.classList.add("hidden");
				fileUploadInput.required = false;
				fileUploadInput.value = null;

			} else {

				// Hide both
				indexNumberField.classList.add("hidden");
				fileUploadField.classList.add("hidden");

				indexNumberInput.value = "";
				fileUploadInput.value = null;
			}
		}

		// Run when selection changes
		countrySelect.addEventListener("change", toggleFields);

		// Run on page load
		toggleFields();
	}

	// ===== Email validation =====

	const emailInput = document.getElementById("emailAddress");
	const emailError = document.getElementById("emailError");

	if (emailInput && emailError) {

		emailInput.addEventListener("blur", function() {

			const email = this.value.trim();

			const emailPattern = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;

			if (!email) {

				emailError.textContent = "Email is required";
				this.classList.add("is-invalid");

			} else if (!emailPattern.test(email)) {

				emailError.textContent = "Invalid email format";
				this.classList.add("is-invalid");

			} else {

				emailError.textContent = "";
				this.classList.remove("is-invalid");
			}
		});
	}

	// ===== Form validation =====

	const form = document.getElementById("scholarshipregistrationfrm");

	if (form) {

		form.addEventListener("submit", function(e) {

			let isValid = true;

			// Validate required dropdowns
			document.querySelectorAll(".required-dropdown").forEach(
					function(dropdown) {

						if (!dropdown.value) {

							dropdown.classList.add("is-invalid");
							isValid = false;

						} else {

							dropdown.classList.remove("is-invalid");
						}
					});

			// Validate visible required inputs
			document.querySelectorAll("[required]").forEach(
					function(field) {

						if (!field.value) {

							field.classList.add("is-invalid");
							isValid = false;

						} else {

							field.classList.remove("is-invalid");
						}
					});

			if (!isValid) {

				e.preventDefault();
				alert("Please fill all required fields.");
			}
		});
	}

});
</script>

<style type="text/css">
.hidden {
	display: none;
}

.is-invalid {
	border: 1px solid red;
}
</style>
<style type="text/css">
.custom-toast {
	min-width: 350px; /* increase width */
	max-width: 500px;
	font-size: 14px;
	box-shadow: 0 6px 18px rgba(0, 0, 0, 0.25);
	border-radius: 10px;
	overflow: hidden;
}

/* Header styling */
.custom-header {
	color: white;
	padding: 10px 15px;
}

/* Body spacing */
.toast-body {
	padding: 15px;
}
</style>

<style type="text/css">
.table-header-green th {
	background-color: #00b300 !important;
	color: white !important;
}
</style>
</head>
<!-- Header -->
<body>
	<div th:replace="~{fragments/header :: header}"></div>

	<section layout:fragment="content">
		<div
			class="container p-2 rounded
            bg-primary text-white shadow-sm">

			<h5 class="mb-0">
				<i class="bi bi-currency-exchange"></i> Scholarship Registration
				Page
			</h5>

		</div>
		<div class="container">
			<div class="border rounded p-4 bg-white shadow-sm">
				<!-- Success message -->

				<!-- Registration Form -->
				<form th:action="@{/scholarship/dcrc-registration}"
					th:object="${scholarshipRegistrationdto}" method="post"
					autocomplete="off" id="scholarshipregistrationfrm"
					enctype="multipart/form-data">

					<input type="hidden" th:field="*{id}" /> <input type="hidden"
						th:field="*{dzongkhagId}" /> <input type="hidden"
						th:field="*{gewogId}" />

					<!-- Citizen ID -->
					<div class="row mb-1">
						<!-- LABEL -->
						<label for="citizenId" class="col-sm-2 col-form-label">
							Enter ID No. : </label>
						<div class="col-md-4">
							<input type="text" th:field="*{citizenId}" id="citizenId"
								class="form-control" placeholder="Enter CID Number"
								autocomplete="off" onblur="fetchCitizenDetails(this.value)"
								required />
						</div>

						<div class="col-md-4">
							<span class="text-danger fw-bold"> <i
								class="bi bi-info-circle-fill"></i> Press <kbd>TAB</kbd> to
								retrieve your details from the <strong>DCRC</strong>.
							</span>
						</div>

						<!-- MESSAGE BOX (RIGHT SIDE) -->
						<div class="col-sm-2 d-flex align-items-center">
							<small id="cidMessage" style="font-weight: bold;"></small>
						</div>

					</div>

					<div class="row mb-1">
						<label for="firstName" class="col-sm-2 col-form-label">First
							Name:</label>
						<div class="col-sm-4">
							<input type="text" th:field="*{firstName}" id="firstName"
								class="form-control" placeholder="Enter First Name"
								autocomplete="off" required readonly>
						</div>

						<label for="middleName" class="col-sm-2 col-form-label">Middle
							Name:</label>
						<div class="col-sm-4">
							<input type="text" th:field="*{middleName}" id="middleName"
								class="form-control" autocomplete="off"
								placeholder="Enter Middle Name" readonly>
						</div>
					</div>
					<div class="row mb-1">
						<label for="lastName" class="col-sm-2 col-form-label">Last
							Name:</label>
						<div class="col-sm-4">
							<input type="text" th:field="*{lastName}" id="lastName"
								class="form-control" placeholder="Enter Last Name"
								autocomplete="off" readonly>
						</div>
						<label for="dateOfBirth" class="col-sm-2 col-form-label">Date
							of Birth:</label>
						<div class="col-sm-4">
							<input type="text" th:field="*{dateOfBirth}" id="dateOfBirth"
								class="form-control" placeholder="Enter Date of Birth"
								autocomplete="off" required readonly>
						</div>
					</div>
					<div class="row mb-1">
						<label for="gender" class="col-sm-2 col-form-label">Gender
							:</label>
						<div class="col-sm-4">
							<input type="text" th:field="*{gender}" id="gender"
								class="form-control" placeholder="Enter Gender"
								autocomplete="off" required readonly>
						</div>
						<label for="fatherName" class="col-sm-2 col-form-label">Father
							Name:</label>
						<div class="col-sm-4">
							<input type="text" th:field="*{fatherName}" id="fatherName"
								class="form-control" placeholder="Enter Father Name"
								autocomplete="off" required readonly>
						</div>
					</div>
					<div class="row mb-1">
						<label for="motherName" class="col-sm-2 col-form-label">Mother
							Name:</label>
						<div class="col-sm-4">
							<input type="text" th:field="*{motherName}" id="motherName"
								class="form-control" placeholder="Enter Mother Name"
								autocomplete="off" required readonly>
						</div>
						<label for="dzongkhagName" class="col-sm-2 col-form-label">Dzongkhag
							Name :</label>
						<div class="col-sm-4">
							<input type="text" th:field="*{dzongkhagName}" id="dzongkhagName"
								class="form-control" placeholder="Enter Dzongkhga Address"
								autocomplete="off" required readonly>
						</div>
					</div>
					<div class="row mb-1">
						<label for="gewogName" class="col-sm-2 col-form-label">Gewog
							Name:</label>
						<div class="col-sm-4">
							<input type="text" th:field="*{gewogName}" id="gewogName"
								class="form-control" placeholder="Enter Gewog Name"
								autocomplete="off" required readonly>
						</div>
						<label for="villageName" class="col-sm-2 col-form-label">Village
							Name :</label>
						<div class="col-sm-4">
							<input type="text" th:field="*{villageName}" id="villageName"
								class="form-control" placeholder="Enter village Name"
								autocomplete="off" required readonly>
						</div>
					</div>
					<div class="row mb-1">
						<label for="emailAddress" class="col-sm-2 col-form-label">Email
							Address :</label>
						<div class="col-sm-4">
							<input type="email" th:field="*{emailAddress}" id="emailAddress"
								class="form-control" placeholder="Enter email address"
								autocomplete="off" required> <small id="emailError"
								style="color: red;"></small>
						</div>
						<label for="contactNo" class="col-sm-2 col-form-label">Student
							Contact Number:</label>
						<div class="col-sm-4">
							<input type="text" th:field="*{contactNo}" id="contactNo"
								class="form-control" placeholder="Enter Contact No."
								autocomplete="off" maxlength="8" pattern="(16|17|77)[0-9]{6}"
								inputmode="numeric"
								oninput="this.value=this.value.replace(/[^0-9]/g,'')" required>
						</div>
					</div>
					<div class="row mb-1">
						<label for="guardianDetail" class="col-sm-2 col-form-label">Guardian
							Name:</label>
						<div class="col-sm-4">
							<input type="text" th:field="*{guardianDetail}"
								id="guardianDetail" class="form-control"
								placeholder="Enter Guardian Name" autocomplete="off" required>
						</div>

						<label for="contactNo" class="col-sm-2 col-form-label">Guardian
							Contact Number:</label>
						<div class="col-sm-4">
							<input type="text" th:field="*{contactNo}" id="contactNo"
								class="form-control" placeholder="Enter Contact No."
								autocomplete="off" maxlength="8" pattern="(16|17|77)[0-9]{6}"
								inputmode="numeric"
								oninput="this.value=this.value.replace(/[^0-9]/g,'')" required>
						</div>
					</div>

					<div class="hr-with-text my-3">
						<span><i>Key Information Section</i></span>
					</div>
					<div class="row mb-1">
						<label for="countryOfCompletion" class="col-sm-2 col-form-label">Country
							Of Completion:</label>
						<div class="col-sm-4">
							<select th:field="*{countryOfCompletion}"
								id="countryOfCompletion" class="form-select required-dropdown">
								<option value="">--Select Country--</option>
								<option value="Bhutan">Bhutan</option>
								<option value="Other">Other Country</option>
							</select>
						</div>
					</div>
					<div class="row mb-1" id="indexNumberContainer">
						<label for="indexNumber" class="col-sm-2 col-form-label">Index
							Number:</label>
						<div class="col-sm-4">
							<input type="text" th:field="*{indexNumber}" id="indexNumber"
								class="form-control" maxlength="12" inputmode="numeric"
								pattern="[0-9]{12}"
								oninput="this.value=this.value.replace(/[^0-9]/g,'')" required>
						</div>

					</div>

					<div class="row mb-1 hidden" id="fileUploadContainer">
						<div class="hr-with-text my-3">
							<span><i>Upload following Supporting Documents (CLass
									10 & 12 Marks and passed certificate)</i></span>
						</div>
						<label for="files" class="col-sm-2 col-form-label">Supporting
							Documents :</label>
						<div class="col-sm-4">
							<input type="file" th:field="*{files}" multiple="multiple"
								id="files" class="form-control"
								placeholder="Upload supporting documents" autocomplete="off">
						</div>

					</div>
					<!-- ----REPEATER STUDENT FILE UPLOAD SECTION-------- -->

					<div class="row mb-1  d-none" id="repeaterDocumentDiv">
						<div class="hr-with-text my-3">
							<span><i>Since you are a repeater, upload any
									supporting document (PDF/DOCS).</i></span>
						</div>
						<label for="files" class="col-sm-2 col-form-label">Supporting
							Documents :</label>
						<div class="col-sm-4">
							<input id="repeaterDocument" type="file" th:field="*{files}"
								multiple class="form-control"
								placeholder="Upload supporting documents" autocomplete="off">
						</div>

					</div>

					<div class="row mb-3">
						<label for="remarks" class="col-sm-2 col-form-label">Remarks
							:</label>
						<div class="col-sm-4">
							<textarea th:field="*{remarks}" id="remarks" class="form-control"
								rows="3" placeholder="Enter remarks here...">
   					 </textarea>
						</div>
					</div>

					<!-- Submit -->
					<div class="d-flex justify-content-center mt-3">
						<button type="submit" class="btn btn-primary"
							th:text="${scholarshipRegistrationdto.id != null} ? 'Update' : 'Register'">
						</button>
					</div>

				</form>

			</div>
		</div>

		<!-- JS Fragment -->
		<th:block
			th:replace="~{fragments/commonresource_js :: common_resource_js}"></th:block>

		<script type="text/javascript">
(function () {

    // ============================================================
    // COMMON ELEMENTS
    // ============================================================

    const form = document.getElementById("scholarshipregistrationfrm");
    const indexField = document.getElementById("indexNumber");
    const countrySelect = document.getElementById("countryOfCompletion");
    const repeaterDiv = document.getElementById("repeaterDocumentDiv");
    const fileInput = document.getElementById("repeaterDocument");
    const statusMsg = document.getElementById("studentStatusMsg");

    // Global repeater flag
    window.isRepeater = false;

    // ============================================================
    // CHECK REPEATER STUDENT
    // ============================================================

    if (indexField && indexField.dataset.bound !== "true") {

        indexField.dataset.bound = "true";

        indexField.addEventListener("blur", function () {

            const indexNumber = this.value.trim();

            if (!indexNumber) {
                return;
            }

            console.log("@@@ Checking Student :", indexNumber);

            fetch("/student/check-student-type/" + indexNumber)
                .then(response => response.json())
                .then(data => {

                    console.log(data);

                    window.isRepeater = data.repeater === true;

                    resetRepeaterUI();

                    if (window.isRepeater) {

                        if (repeaterDiv) {
                            repeaterDiv.classList.remove("d-none");
                        }

                        if (fileInput) {
                            fileInput.required = true;
                        }

                        Swal.fire({
                            icon: "warning",
                            title: "Repeater Student",
                            html:
                                "<b>You are identified as a repeater student.</b><br><br>" +
                                "Please upload the required supporting document before submitting your registration.",
                            confirmButtonColor: "#f39c12"
                        });

                    } else {

                        if (repeaterDiv) {
                            repeaterDiv.classList.add("d-none");
                        }

                        if (fileInput) {
                            fileInput.required = false;
                            fileInput.value = "";
                        }

                    }

                })
                .catch(error => {

                    console.error(error);

                    Swal.fire({
                        icon: "error",
                        title: "System Error",
                        text: "Unable to verify student information.",
                        confirmButtonColor: "#dc3545"
                    });

                });

        });

    }

    // ============================================================
    // RESET WHEN COUNTRY CHANGES
    // ============================================================

    if (countrySelect && countrySelect.dataset.bound !== "true") {

        countrySelect.dataset.bound = "true";

        countrySelect.addEventListener("change", function () {

            resetRepeaterUI();
            window.isRepeater = false;

        });

    }

    // ============================================================
    // FORM VALIDATION
    // ============================================================

    if (form) {

        form.addEventListener("submit", function (e) {

            if (!window.isRepeater) {
                return;
            }

            if (!fileInput || !fileInput.files || fileInput.files.length === 0) {

                e.preventDefault();
                e.stopPropagation();

                fileInput.classList.add("is-invalid");

                Swal.fire({
                    icon: "warning",
                    title: "Supporting Document Required",
                    text: "Please upload the repeater supporting document before submitting your registration.",
                    confirmButtonColor: "#f39c12"
                });

                fileInput.focus();

                return false;
            }

        });

    }

    // ============================================================
    // RESET REPEATER UI
    // ============================================================

    function resetRepeaterUI() {

        if (repeaterDiv) {
            repeaterDiv.classList.add("d-none");
        }

        if (fileInput) {
            fileInput.required = false;
            fileInput.value = "";
            fileInput.classList.remove("is-invalid");
        }

        if (statusMsg) {
            statusMsg.innerHTML = "";
        }

    }

})();
</script>

		<!-- ========================================================= -->
		<!-- SUCCESS MESSAGE -->
		<!-- ========================================================= -->

		<script th:if="${successMessage != null}">
Swal.fire({
    icon: 'success',
    title: 'Scholarship Registration Successful',
    text: '[[${successMessage}]]',
    confirmButtonColor: '#198754',
    confirmButtonText: 'OK',
    allowOutsideClick: false
});
</script>

		<!-- ========================================================= -->
		<!-- ERROR MESSAGE -->
		<!-- ========================================================= -->
		<!-- SweetAlert2 -->
		<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

		<!-- Error Message Handler -->
		<script th:inline="javascript">
document.addEventListener("DOMContentLoaded", function () {

    const errorType = /*[[${errorType}]]*/ "";
    const errorMessage = /*[[${errorMessage}]]*/ "";

    if (!errorMessage) {
        return;
    }

    switch (errorType) {

        case "ELIGIBILITY":

            Swal.fire({
                icon: 'warning',
                title: 'Sorry!',
                html:
                    '<div style="text-align:center;">' +
                    '<h5><strong>You are not eligible for any scholarship.</strong></h5>' +
                    '<p>' + errorMessage.replace(/\n/g, '<br>') + '</p>' +
                    '<hr>' +
                    '<small><strong>Scholarship Registration Service</strong><br>Royal Civil Service Commission (RCSC)</small>' +
                    '</div>',
                confirmButtonText: 'OK',
                confirmButtonColor: '#f39c12',
                allowOutsideClick: false,
                allowEscapeKey: false
            });
            break;

        case "BCSEA_API":

            Swal.fire({
                icon: 'error',
                title: 'BCSEA Service Unavailable',
                text: errorMessage,
                confirmButtonColor: '#dc3545'
            });
            break;

        case "FILE_UPLOAD":

            Swal.fire({
                icon: 'error',
                title: 'File Upload Failed',
                text: errorMessage,
                confirmButtonColor: '#dc3545'
            });
            break;
            
        case "BUSINESS":

            Swal.fire({
                icon: "warning",
                title: "Already Registered",
                text: errorMessage,
                confirmButtonColor: "#f39c12"
            });

            break;

        default:

            Swal.fire({
                icon: 'error',
                title: 'Registration Failed',
                text: errorMessage,
                confirmButtonColor: '#dc3545'
            });
    }

});
</script>
</body>
</section>
</body>
</html>
